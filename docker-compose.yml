version: "3.9"
services:
  backend:
    build:
      context: ./server
    image: 901444280953.dkr.ecr.ap-southeast-2.amazonaws.com/n11817143-a2-backend:latest
    environment:
      - NODE_ENV=production
      - PORT=4000
      - AWS_REGION=ap-southeast-2
      - APP_SECRET_NAME=n11817143-a2-secret
    expose:
      - "4000"

  frontend:
    build:
      context: ./client
    image: 901444280953.dkr.ecr.ap-southeast-2.amazonaws.com/n11817143-a2-frontend:latest
    expose:
      - "80"

  proxy:
    image: nginx:1.25-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
